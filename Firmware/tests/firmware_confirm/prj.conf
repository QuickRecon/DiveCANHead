CONFIG_ZTEST=y
CONFIG_LOG=y
CONFIG_ZBUS=y
CONFIG_REBOOT=y

# Tight deadline + sub-timeouts so every test completes in under a second
# rather than the production 45 s. The state machine is the same — only
# the wall-clock budgets are different.
CONFIG_FIRMWARE_CONFIRM_DEADLINE_MS=600
CONFIG_FIRMWARE_CONFIRM_CELL_TIMEOUT_MS=300
CONFIG_FIRMWARE_CONFIRM_CONSENSUS_TIMEOUT_MS=200
CONFIG_FIRMWARE_CONFIRM_PPO2_TX_TIMEOUT_MS=200
CONFIG_FIRMWARE_CONFIRM_HANDSET_TIMEOUT_MS=200
CONFIG_FIRMWARE_CONFIRM_SOL_TIMEOUT_MS=200

# We don't link any solenoid-related code in this test build so HAS_O2_SOLENOID
# is left unset by default — the POST module compiles the no-op skip path.
# CONFIG_CELL_COUNT is forced via target_compile_definitions in the
# CMakeLists since it lives in the product-topology Kconfig we don't source.

# Pull in chan_solenoid_status / chan_atmos_pressure declarations even though
# we link the channel definitions out — the production firmware_confirm.c
# references chan_solenoid_status only under CONFIG_HAS_O2_SOLENOID, and we
# leave that off.
#
# CONFIG_CELL_COUNT lives in src/Kconfig (product-topology menu) — we don't
# rsource that file into the test, and the oxygen_cell_channels.c source we
# link sees the symbol via the preprocessor only. The CMakeLists supplies
# CONFIG_CELL_COUNT=3 as a target_compile_definition instead.
