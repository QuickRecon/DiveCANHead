CONFIG_ZTEST=y
CONFIG_LOG=y
CONFIG_ZBUS=y

# uds.c uses k_uptime_get_32. sys_reboot is wrapped but the header
# requires CONFIG_REBOOT for the prototype to be visible.
CONFIG_REBOOT=y

# Pulled in transitively. We don't exercise the settings paths but the
# settings subsystem links against the dispatcher in uds.c.
CONFIG_SETTINGS=y
CONFIG_SETTINGS_RUNTIME=y

# Same rationale as tests/uds_ota: we deliberately do NOT enable
# BOOTLOADER_MCUBOOT — it y-selects USE_DT_CODE_PARTITION which doesn't
# apply to native_sim. All boot_*, flash_img_*, flash_area_* and
# factory_image_* symbols are wrapped, so we never reach the real
# implementations. The headers we need are always available.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
