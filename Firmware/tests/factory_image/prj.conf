CONFIG_ZTEST=y
CONFIG_LOG=y
CONFIG_ZBUS=y
CONFIG_REBOOT=y

# Pull in the factory_image module under test but force the flash backend
# off so we don't have to wrap settings/flash for the production backend.
# The test installs an in-RAM mock backend via factory_image_set_backend_for_test.
CONFIG_FACTORY_IMAGE=y
# CONFIG_FACTORY_IMAGE_BACKEND_FLASH is not set
# CONFIG_FACTORY_IMAGE_BACKEND_FS is not set
CONFIG_FACTORY_IMAGE_CHUNK_SIZE=512

# The factory_image.c production path tries to resolve a compile-time
# backend via factory_image_get_flash_backend(); with both backends off
# the function isn't linked and resolve_backend() returns NULL. We
# inject the mock via factory_image_set_backend_for_test() in the test
# fixture instead.

# Settings subsystem isn't needed (we don't link the flash backend)
# but errors.c assumes the build has _some_ valid layout for chan_error.

# flash_area_* symbols are wrapped, but the linker still wants real
# definitions for the __real_* references inside the wrap stubs.
# Pulling in FLASH + FLASH_MAP brings them in from Zephyr's storage
# layer; the actual flash backend is the native_sim flash_simulator,
# which we never actually exercise (our wraps short-circuit everything).
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# MCUBoot dfu lib provides boot_request_upgrade — which we --wrap so the
# wrap creates a __real_ alias, and the link needs a real one too.
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y
