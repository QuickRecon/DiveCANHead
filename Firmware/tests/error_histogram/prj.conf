CONFIG_ZTEST=y
CONFIG_LOG=y
CONFIG_ZBUS=y
# errors.c fatal handler calls sys_reboot
CONFIG_REBOOT=y

# Settings subsystem must be present so SETTINGS_STATIC_HANDLER_DEFINE compiles,
# but we override settings_save_one/settings_load_subtree with stubs from main.c
# so we don't need a real flash backend on native_sim.
CONFIG_SETTINGS=y
CONFIG_SETTINGS_RUNTIME=y
