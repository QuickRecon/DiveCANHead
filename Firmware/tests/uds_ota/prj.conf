CONFIG_ZTEST=y
CONFIG_LOG=y
CONFIG_ZBUS=y

# uds.c uses k_uptime_get_32 and (transitively via uds_ota.c) sys_reboot.
CONFIG_REBOOT=y

# Pulled in by uds_settings.c and uds_state_did.c. We don't exercise the
# settings or state-DID paths in the OTA test, but the modules link against
# the OTA dispatch through uds.c so they must compile.
CONFIG_SETTINGS=y
CONFIG_SETTINGS_RUNTIME=y

# We deliberately do NOT enable BOOTLOADER_MCUBOOT here — it y-selects
# USE_DT_CODE_PARTITION which doesn't apply to native_sim. All boot_*,
# flash_img_*, and flash_area_* symbols are wrapped, so we never reach
# the real implementations. The headers we need (zephyr/dfu/mcuboot.h
# and zephyr/dfu/flash_img.h) are always available — they're not gated
# on the Kconfig.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y
CONFIG_IMG_ENABLE_IMAGE_CHECK=y
CONFIG_IMG_BLOCK_BUF_SIZE=512
