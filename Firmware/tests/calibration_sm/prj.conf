CONFIG_ZTEST=y
CONFIG_LOG=y
CONFIG_ZBUS=y
CONFIG_ZBUS_MSG_SUBSCRIBER=y
CONFIG_REBOOT=y

# State Machine Framework — flat-only.
CONFIG_SMF=y
# CONFIG_SMF_ANCESTOR_SUPPORT is not set
# CONFIG_SMF_INITIAL_TRANSITION is not set

# settings_save_one / settings_runtime_get / settings_load_subtree are
# wrapped in CMakeLists with linker --wrap, so the settings backend
# itself isn't pulled in. CONFIG_SETTINGS is still needed to declare
# the function prototypes the code calls (the SETTINGS_STATIC_HANDLER_DEFINE
# macro requires the subsystem header pieces to exist).
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NONE=y
