# Opt-in Kconfig overlay for sanitizer-instrumented integration builds.
#
# Layered on top of integration.conf:
#   west build -d build-native/integration-asan -b native_sim . \
#     -- -DBOARD_ROOT=. \
#        -DDTC_OVERLAY_FILE=tests/integration/boards/native_sim.overlay \
#        -DEXTRA_CONF_FILE="tests/integration/integration.conf;\
#                          variants/dev_full.conf;\
#                          tests/integration/sanitizers.conf"
#
# When something fails, the binary prints a sanitizer report to stderr
# (captured in ``/tmp/divecan_firmware.log`` by conftest).  Real bugs in
# *our* code are the goal; expect occasional reports from Zephyr
# framework code which can be suppressed via ASAN_OPTIONS /
# UBSAN_OPTIONS at run time.

# AddressSanitizer — catches heap/stack overflow, use-after-free,
# double-free, etc.
CONFIG_ASAN=y

# UndefinedBehaviorSanitizer — signed overflow, null deref, OOB shift,
# alignment violations.
CONFIG_UBSAN=y

# Keep going after a UBSAN report so we see all issues, not just the
# first.  ASAN reports are always fatal regardless (they indicate real
# memory corruption that's already happened).
CONFIG_ASAN_RECOVER=y

# Sanitizer-enabled GCC can promote -Wmaybe-uninitialized to an error
# in framework files (uart_emul.c, etc.) where the instrumentation
# obscures the data flow.  Relax the warning so the build completes;
# real issues in our code still surface via the runtime checks.
CONFIG_COMPILER_WARNINGS_AS_ERRORS=n
