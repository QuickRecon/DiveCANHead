# Integration test Kconfig overrides for native_sim build.
# Applied via -DEXTRA_CONF_FILE alongside variants/dev_full.conf.

# ---- Console: native UART instead of RTT ----
# CONFIG_USE_SEGGER_RTT is not set
# CONFIG_RTT_CONSOLE is not set

# ---- Logging: override prj.conf deferred-mode settings ----
# native_sim defaults to immediate logging; prj.conf sets deferred-mode
# options that conflict. Just let the native_sim defaults win.
# CONFIG_LOG_PROCESS_THREAD_PRIORITY is not set
# CONFIG_LOG_BUFFER_SIZE is not set

# ---- CAN: Linux SocketCAN on vcan0 ----
CONFIG_CAN=y
CONFIG_CAN_NATIVE_LINUX=y

# ---- Emulation subsystem (required by uart_emul, adc_emul) ----
CONFIG_EMUL=y

# ---- UART: emulated (async API for cell drivers) ----
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y
CONFIG_UART_EMUL=y

# ---- ADC: emulated (replaces ADS1115 I2C ADCs) ----
CONFIG_ADC=y
CONFIG_ADC_EMUL=y
CONFIG_ADC_EMUL_CONFIGURABLE_INPUTS=y

# ---- Disable hardware not available on native_sim ----
# CONFIG_I2C is not set
# CONFIG_DMA is not set
# CONFIG_SPI is not set
# CONFIG_SENSOR is not set
# CONFIG_HW_STACK_PROTECTION is not set

# ---- Counter (solenoid deadman) ----
CONFIG_COUNTER=y

# ---- Regulator (VBUS) ----
CONFIG_REGULATOR=y

# ---- Flash / NVS / Settings ----
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_SETTINGS_RUNTIME=y

# ---- POSIX networking for shim Unix domain socket ----
CONFIG_POSIX_API=y

# ---- Integration test shim ----
CONFIG_INTEGRATION_TEST_SHIM=y

# ---- Entropy (available on native_sim) ----
CONFIG_ENTROPY_GENERATOR=y

# ---- Floating-point printf in picolibc ----
# Default picolibc on this NCS build emits literal "*float*" for %f
# format specs, breaking sensor response strings and log lines.
CONFIG_PICOLIBC_IO_FLOAT=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# ---- GPIO init priority: must be < 20 so gpio_sim is ready before the
# ---- shim bootstrap (POST_KERNEL:20) which must run before
# ---- hw_version_init (POST_KERNEL:30).
CONFIG_GPIO_INIT_PRIORITY=15

# ---- zbus message-subscriber net_buf pool ----
# Switch from dynamic-heap allocation (CONFIG_HEAP_MEM_POOL_SIZE=0 by
# default on this board so alloc fails immediately) to a fixed-size
# pool.  Sized for the largest channel message.
CONFIG_ZBUS_MSG_SUBSCRIBER_BUF_ALLOC_STATIC=y
CONFIG_ZBUS_MSG_SUBSCRIBER_NET_BUF_POOL_SIZE=256
CONFIG_ZBUS_MSG_SUBSCRIBER_NET_BUF_STATIC_DATA_SIZE=128
# Enable observer/channel naming so 'could not deliver' logs identify the
# misbehaving observer.  Free at runtime; costs a few bytes of rodata.
CONFIG_ZBUS_CHANNEL_NAME=y
CONFIG_ZBUS_OBSERVER_NAME=y

# ---- Watchdog (not needed) ----
# CONFIG_WATCHDOG is not set

# ---- Stack canaries (needs entropy) ----
CONFIG_STACK_CANARIES=y
