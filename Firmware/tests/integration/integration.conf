# Integration test Kconfig overrides for native_sim build.
# Applied via -DEXTRA_CONF_FILE alongside variants/dev_full.conf.

# ---- Runtime sanitizers (opt-in) ----
# AddressSanitizer + UndefinedBehaviorSanitizer catch heap/stack
# overflows, use-after-free, type punning, signed overflow, etc.
# Zephyr's posix arch CMakeLists wires the -fsanitize flags automatically
# when these symbols are set.  Disabled by default because:
#   1. Sanitizer-enabled GCC promotes maybe-uninitialized to error in
#      some Zephyr framework files (uart_emul.c, etc.) where the data
#      flow becomes opaque to the compiler with instrumentation; fixing
#      that requires relaxing -Werror for those translation units.
#   2. Adds ~20% runtime overhead and ~3× memory footprint.
# Enable on demand for memory-error-hunting runs:
#   west build ... -DEXTRA_CONF_FILE="...;sanitizers.conf"
# See ``tests/integration/sanitizers.conf`` for the toggles + warning
# relaxation needed to build cleanly.
# CONFIG_ASAN is not set
# CONFIG_UBSAN is not set

# ---- Simulated time pacing ----
# Default to real-time pacing so the harness's wall-clock waits
# (helpers.calibrate_board, battery monitor settle, etc.) line up
# with the firmware's internal timing.  Tests that want
# accelerated execution should pass ``--rt-ratio=<N>`` to the binary
# at launch via the firmware fixture — e.g. ``--rt-ratio=0.1`` makes
# 1 s real = 10 s simulated.  Fractional acceleration preserves
# enough wall/sim coupling for the shim socket and CAN-frame
# observation to remain stable, vs full decoupling
# (CONFIG_NATIVE_SIM_SLOWDOWN_TO_REAL_TIME=n) which destabilises
# tests that depend on the firmware processing requests within a
# bounded wall-time window.

# ---- Console: native UART instead of RTT ----
# CONFIG_USE_SEGGER_RTT is not set
# CONFIG_RTT_CONSOLE is not set

# ---- Logging: override prj.conf deferred-mode settings ----
# native_sim defaults to immediate logging; prj.conf sets deferred-mode
# options that conflict. Just let the native_sim defaults win.
# CONFIG_LOG_PROCESS_THREAD_PRIORITY is not set
# CONFIG_LOG_BUFFER_SIZE is not set

# ---- CAN: Linux SocketCAN on vcan0 ----
CONFIG_CAN=y
CONFIG_CAN_NATIVE_LINUX=y

# ---- Emulation subsystem (required by uart_emul, adc_emul) ----
CONFIG_EMUL=y

# ---- UART: emulated (async API for cell drivers) ----
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y
CONFIG_UART_EMUL=y

# ---- ADC: emulated (replaces ADS1115 I2C ADCs) ----
CONFIG_ADC=y
CONFIG_ADC_EMUL=y
CONFIG_ADC_EMUL_CONFIGURABLE_INPUTS=y

# ---- Disable hardware not available on native_sim ----
# CONFIG_I2C is not set
# CONFIG_DMA is not set
# CONFIG_SPI is not set
# CONFIG_SENSOR is not set
# CONFIG_HW_STACK_PROTECTION is not set

# ---- MCUBoot bridge for native_sim ----
# BOOTLOADER_MCUBOOT y-selects USE_DT_CODE_PARTITION, which has no native_sim
# specialisation. Force it off here. We still want the bootutil + img_manager
# libraries linked so uds_ota.c can call boot_read_bank_header,
# boot_request_upgrade, and flash_img_* against the flash simulator.
# CONFIG_BOOTLOADER_MCUBOOT is not set
CONFIG_MCUBOOT_BOOTUTIL_LIB=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_IMG_MANAGER=y
CONFIG_IMG_ENABLE_IMAGE_CHECK=y
CONFIG_IMG_BLOCK_BUF_SIZE=4096
CONFIG_STREAM_FLASH=y

# ---- Counter (solenoid deadman) ----
CONFIG_COUNTER=y

# ---- Regulator (VBUS) ----
CONFIG_REGULATOR=y

# ---- Flash / NVS / Settings ----
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_SETTINGS_RUNTIME=y

# ---- POSIX networking for shim Unix domain socket ----
CONFIG_POSIX_API=y

# ---- Integration test shim ----
CONFIG_INTEGRATION_TEST_SHIM=y

# ---- Entropy (available on native_sim) ----
CONFIG_ENTROPY_GENERATOR=y

# ---- Floating-point printf in picolibc ----
# Default picolibc on this NCS build emits literal "*float*" for %f
# format specs, breaking sensor response strings and log lines.
CONFIG_PICOLIBC_IO_FLOAT=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# ---- GPIO init priority: must be < 20 so gpio_sim is ready before the
# ---- shim bootstrap (POST_KERNEL:20) which must run before
# ---- hw_version_init (POST_KERNEL:30).
CONFIG_GPIO_INIT_PRIORITY=15

# ---- zbus message-subscriber net_buf pool ----
# Switch from dynamic-heap allocation (CONFIG_HEAP_MEM_POOL_SIZE=0 by
# default on this board so alloc fails immediately) to a fixed-size
# pool.  Sized for the largest channel message.
CONFIG_ZBUS_MSG_SUBSCRIBER_BUF_ALLOC_STATIC=y
CONFIG_ZBUS_MSG_SUBSCRIBER_NET_BUF_POOL_SIZE=256
CONFIG_ZBUS_MSG_SUBSCRIBER_NET_BUF_STATIC_DATA_SIZE=128
# Enable observer/channel naming so 'could not deliver' logs identify the
# misbehaving observer.  Free at runtime; costs a few bytes of rodata.
CONFIG_ZBUS_CHANNEL_NAME=y
CONFIG_ZBUS_OBSERVER_NAME=y

# ---- Watchdog (not needed) ----
# CONFIG_WATCHDOG is not set

# ---- Stack canaries (needs entropy) ----
CONFIG_STACK_CANARIES=y
