# MCUBoot bootloader Kconfig overrides for the DiveCAN Jr image
# (consumed by sysbuild when building the bootloader child image).

# Integrity-only — SHA-256 hash verification, no asymmetric crypto.
# See sysbuild.conf for the "open platform" rationale.
CONFIG_BOOT_SIGNATURE_TYPE_NONE=y

# Validate slot0 on every boot — catches flash bit-rot or sector
# failure on the running image before jumping into it. The full
# SHA-256 walk pulls in ~10 KB of hash code; we keep it because
# slot0 validation is a non-negotiable safety property for this
# safety-critical platform (CCR head). Combined with the slot1
# validation that runs inside MCUBoot's swap path, every executed
# byte has been hash-checked before it runs.
#
# (BOOT_VALIDATE_SLOT0 also defaults to y in MCUBoot's Kconfig, so
# this is belt-and-braces — explicit is better than implicit.)
CONFIG_BOOT_VALIDATE_SLOT0=y

# Swap-using-scratch — see sysbuild.conf rationale.
# BOOT_MAX_IMG_SECTORS is left to auto (BOOT_MAX_IMG_SECTORS_AUTO)
# so MCUBoot derives the right value from slot size and sector size.
CONFIG_BOOT_SWAP_USING_SCRATCH=y

# Feed the hardware IWDG during validation + swap. The L4 IWDG sits
# outside the RCC reset domain so survives sys_reboot() — without
# this MCUBoot would be reset mid-swap. WDT cannot be disabled on
# this part, only fed.
CONFIG_BOOT_WATCHDOG_FEED=y
CONFIG_WDT_DISABLE_AT_BOOT=n

# Note: upstream MCUBoot's CONFIG_MCUBOOT_INDICATION_LED is gated on
# MCUBOOT_SERIAL/USB DFU mode — it only blinks while the bootloader
# is in serial-recovery DFU, not during a normal cold-boot swap. We
# don't run serial recovery, so the LED stays under the app's control
# from the first instant it gets executed. If pre-app LED indication
# becomes important later, a small custom hook in
# bootloader/mcuboot/boot/zephyr/main.c (toggle PB0 once per loop)
# is the smallest delta — flagged in the OTA plan, deferred for now.

# Flash + SPI-NOR for the external W25Q512JV.
CONFIG_FLASH=y
CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_SFDP_RUNTIME=y

# Board defconfig forces I2C=y for the application's ADS1115 ADC,
# and the ADC driver compiles against the I2C node. MCUBoot doesn't
# need either, but disabling them at this layer would have a cascade
# of dependency errors. Easier and safer: align CONFIG_I2C=y here so
# all merge sources agree, accept ~3 KB code-size cost. Trimming
# unused app peripherals from MCUBoot would require a separate
# divecan_jr_mcuboot_defconfig — flagged for future optimisation
# rather than blocking Phase 1.
CONFIG_I2C=y

# RTT logging — same channel the app uses, so MCUBoot output is
# visible during the bootloader window.
CONFIG_LOG=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y

# Multithreading: leave at the MCUBoot Kconfig default (=y for STM32
# per bootloader/mcuboot/boot/zephyr/Kconfig:1468). The STM32 SPI
# driver uses SPI_CONTEXT_INIT_LOCK/_SYNC unconditionally — those
# init macros reference struct fields gated on MULTITHREADING in
# zephyr/drivers/spi/spi_context.h:78-81, so forcing =n breaks the
# build. MCUBoot remains effectively single-threaded in practice;
# the kernel scheduler just sits idle. RAM cost is modest (~1 KB).
