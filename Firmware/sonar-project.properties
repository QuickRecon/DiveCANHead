sonar.projectKey=QuickRecon_DiveCANHead
sonar.organization=quickrecon

# Scope sources to the Firmware tree so a scanner started here cannot
# walk up into ../zephyr, ../modules, ../bootloader, ../tools/edtt,
# or ../tools/net-tools (the west workspace dirs).
sonar.sources=src,drivers,include,boards,dts,variants
sonar.tests=tests
sonar.exclusions=build/**,build_test_*/**,twister-out*/**

# No blanket rule suppressions. The handful of legitimate carve-outs are
# documented in `docs/SONARQUBE_ACCEPTED_ISSUES.md`; each instance should be
# marked "Won't Fix" or "False Positive" on the SonarCloud web UI on a
# per-issue basis so the rule stays enforced everywhere else.
