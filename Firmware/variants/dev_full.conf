# Dev Full — All features enabled for testing
# Mixed cell types, all 4 solenoids, dual O2 inject
# Battery + CAN fallback

# Cells
CONFIG_CELL_COUNT=3
CONFIG_CELL_1_TYPE_DIVEO2=y
CONFIG_CELL_2_TYPE_O2S=y
CONFIG_CELL_3_TYPE_ANALOG=y

# Power
CONFIG_POWER_MODE_BATTERY_THEN_CAN=y
CONFIG_BATTERY_CHEMISTRY_LI2S=y

# Solenoids — all 4 channels active
CONFIG_SOL_O2_INJECT_CHANNEL=0
CONFIG_SOL_O2_INJECT_2_CHANNEL=1
CONFIG_SOL_O2_FLUSH_CHANNEL=2
CONFIG_SOL_DIL_FLUSH_CHANNEL=3

# Defaults
CONFIG_PPO2_CONTROL_DEFAULT_PID=y
CONFIG_CAL_MODE_DEFAULT_FLUSH=y
CONFIG_DEPTH_COMPENSATION_DEFAULT=y
CONFIG_EXTENDED_MESSAGES_DEFAULT=y
