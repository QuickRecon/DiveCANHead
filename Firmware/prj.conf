CONFIG_PRINTK=y
CONFIG_GPIO=y
CONFIG_CONSOLE=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y

# Hardening (applied globally — Zephyr + app)
# Entropy/RNG disabled — crashes during init on Jr hardware.
# Root cause is likely PLL Q clock config for CLK48 mux.
# TODO: Debug with RNG registers on hardware.
# CONFIG_ENTROPY_GENERATOR=y
# CONFIG_STACK_CANARIES_STRONG=y
CONFIG_FORTIFY_SOURCE_RUN_TIME=y
CONFIG_HW_STACK_PROTECTION=y
CONFIG_COMPILER_WARNINGS_AS_ERRORS=y
CONFIG_OVERRIDE_FRAME_POINTER_DEFAULT=y

# Main thread stack — needs headroom for device init (entropy/RNG, clocks, ADC)
CONFIG_MAIN_STACK_SIZE=2048

# Assertions (kept in production — controlled reboot over undefined behavior)
CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=y

# Logging — deferred mode with increased buffer and thread priority
# so the logging thread doesn't get starved at 12MHz SYSCLK
CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=2048
CONFIG_LOG_PROCESS_THREAD_PRIORITY=3

# Reboot
CONFIG_REBOOT=y

# IPC (zbus for decoupled inter-module communication)
CONFIG_ZBUS=y
CONFIG_ZBUS_MSG_SUBSCRIBER=y

# ---- MCUBoot + OTA support ----
# Build app as an MCUBoot-compatible image (slot0). Sysbuild also
# pulls in the bootloader as a child image — see sysbuild.conf and
# sysbuild/mcuboot.conf.
CONFIG_BOOTLOADER_MCUBOOT=y

# Bootutil library — exposes boot_swap_type, boot_read_bank_header,
# bootutil_img_validate to the application so it can interrogate
# MCUBoot state and pre-validate slot1 before triggering activation.
CONFIG_MCUBOOT_BOOTUTIL_LIB=y

# Image manager API — boot_request_upgrade, boot_write_img_confirmed,
# boot_is_img_confirmed.
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_IMG_MANAGER=y

# Buffered flash writer for the OTA RX path. 4 KB matches the
# external W25Q512JV 4 KB sector erase size.
CONFIG_IMG_BLOCK_BUF_SIZE=4096
CONFIG_STREAM_FLASH=y
CONFIG_FLASH_MAP=y

# SHA-256 walk over a flash area — used by the UDS-OTA pre-activation
# pipeline to verify slot1 matches the SHA-256 TLV embedded in the
# image trailer before boot_request_upgrade() is allowed to run.
CONFIG_IMG_ENABLE_IMAGE_CHECK=y

# ---- Settings + NVS on external SPI NOR ----
# Storage partition (label "storage") now lives at the top of the
# 64 MB external NOR — see DTS partition map. Zephyr settings
# subsystem auto-discovers it via the storage_partition node name.
CONFIG_FLASH=y
CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_SFDP_RUNTIME=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y

# SPI NOR exposes 4 KB sector erase and 64 KB block erase. The
# default layout page size (65536) overflows the NVS sector-size
# check (must fit in UINT16, max 65535 — exactly 1 byte short).
# Switch to 4096 so the settings subsystem can mount the storage
# partition cleanly. The 32 KB storage partition is then 8 sectors
# (= CONFIG_SETTINGS_NVS_SECTOR_COUNT range).
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
