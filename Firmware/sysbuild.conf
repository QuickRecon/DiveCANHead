# Sysbuild configuration for DiveCAN Jr firmware with MCUBoot.
#
# See ARCHITECTURE.md and the OTA plan for design rationale. Key
# choices captured here:
#
# - MCUBoot is the bootloader (slot0 = internal flash 224K,
#   slot1 + scratch + factory = external NOR).
# - Swap-using-scratch — the scratch partition gives clean failure
#   isolation: slot0 is untouched until each swap step completes.
#   Higher write amplification than swap-using-move but easier to
#   reason about under power loss.
# - No private-key signing. SHA-256 integrity only. This is an open
#   platform — anyone can build and flash without holding a signing
#   key. Per-image hash verification (`bootutil_img_validate`) still
#   catches corruption pre-swap.

SB_CONFIG_BOOTLOADER_MCUBOOT=y
SB_CONFIG_MCUBOOT_MODE_SWAP_SCRATCH=y
SB_CONFIG_BOOT_SIGNATURE_TYPE_NONE=y
SB_CONFIG_BOOT_SIGNATURE_KEY_FILE=""

# Emit a single merged.hex containing bootloader + signed app for
# convenient `west flash` / probe-rs / openocd flashing.
SB_CONFIG_MERGED_HEX_FILES=y
